global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'infragenie-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/api/metrics'

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'azure-resources'
    scrape_interval: 60s
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/api/azure/health'

  - job_name: 'node-exporters'
    scrape_interval: 30s
    file_sd_configs:
      - files:
          - '/prometheus-targets/*.json'
    relabel_configs:
      - source_labels: [__meta_filepath]
        target_label: __metrics_path__
        replacement: /metrics
